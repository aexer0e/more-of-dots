name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Windows app
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            leaderboard-worker/package-lock.json

      - name: Select stable Rust
        shell: pwsh
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm ci --prefix leaderboard-worker

      - name: Run Python tests
        run: .\.venv\Scripts\python.exe -m pytest -q

      - name: Check TypeScript
        run: npm run check

      - name: Audit JavaScript dependencies
        run: |
          npm audit --audit-level=high
          npm --prefix leaderboard-worker audit --audit-level=high

      - name: Check Rust formatting
        shell: pwsh
        run: |
          cargo fmt --all --check --manifest-path tools/python-probe-dll/Cargo.toml
          cargo fmt --all --check --manifest-path src-tauri/Cargo.toml

      - name: Build packaged backend prerequisites
        run: npm run build:sidecar -- -SkipInstall

      - name: Check Rust workspaces
        shell: pwsh
        run: |
          cargo check --locked --manifest-path tools/python-probe-dll/Cargo.toml
          cargo check --locked --manifest-path src-tauri/Cargo.toml
