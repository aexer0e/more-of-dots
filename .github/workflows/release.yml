name: Draft Windows release

on:
  push:
    paths:
      - VERSION

permissions:
  contents: write

concurrency:
  group: draft-release
  cancel-in-progress: true

jobs:
  build:
    name: Build and draft
    if: github.ref_name == github.event.repository.default_branch
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        shell: pwsh
        run: node scripts/version.mjs release-check

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create Python environment
        run: python -m venv .venv

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Prepare signed release configuration
        run: npm run version:release-config

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: More of Dots v__VERSION__
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: --bundles nsis --config build/tauri.version.conf.json
